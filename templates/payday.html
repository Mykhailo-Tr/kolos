<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayDay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 25s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 300px;
            height: 300px;
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        .circle:nth-child(3) {
            width: 250px;
            height: 250px;
            top: 40%;
            left: 5%;
            animation-delay: 10s;
        }

        .circle:nth-child(4) {
            width: 200px;
            height: 200px;
            bottom: 30%;
            right: 10%;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            25% {
                transform: translateY(-40px) translateX(30px) rotate(90deg);
            }
            50% {
                transform: translateY(-20px) translateX(-30px) rotate(180deg);
            }
            75% {
                transform: translateY(30px) translateX(20px) rotate(270deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            max-width: 900px;
        }

        h1 {
            font-size: 140px;
            font-weight: 900;
            background: linear-gradient(45deg, #ffffff, #ffd700, #ffffff, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 80px rgba(255, 215, 0, 0.5);
            letter-spacing: -3px;
            animation: shimmer 4s infinite, pulse 2s infinite;
            margin-bottom: 40px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .message {
            color: #ffffff;
            font-size: 32px;
            font-weight: 600;
            line-height: 1.6;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
            animation: fadeIn 1.5s ease-out;
        }

        .submessage {
            color: rgba(255, 255, 255, 0.85);
            font-size: 22px;
            font-weight: 400;
            line-height: 1.8;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .highlight {
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 80px;
            }

            .message {
                font-size: 24px;
            }

            .submessage {
                font-size: 18px;
            }

            .container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="glow"></div>

    <div class="container">
        <h1>PayDay</h1>
        <p class="message">Настав час виконати свої зобов'язання</p>
        <p class="submessage">
            Не відкладайте на завтра те, що потрібно <span class="highlight">оплатити сьогодні</span>.
            <br>
            Кожна хвилина затримки — це <span class="highlight">втрачені можливості</span>.
            <br>
            Зробіть це зараз і звільніться від турбот.
        </p>
    </div>
</body>
</html>
